# Re-baseline checkpoints
rebaseline_checkpoints:
  - after_sprint: 0
    type: 'go_no_go'
    description: 'Verdict POCs. Si POC #1 fail → retour architecture. Si pass → démarrage Sprint 1.'
  - after_sprint: 1
    type: 'velocity_calibration'
    description: 'Première mesure vélocité réelle. Calibration confirmée ou ajustée.'
  - after_sprint: 2
    type: 'velocity_confirmation'
    description: 'Confirmation stabilité vélocité. Décision finale 8 vs 10 pts/sprint.'
  - after_sprint: 6
    type: 'mid_mvp_checkpoint'
    description: 'Checkpoint mi-MVP — replan si nécessaire.'

