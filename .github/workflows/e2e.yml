name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly at 3am UTC
    - cron: '0 3 * * *'

jobs:
  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Cache uv virtualenv
        uses: actions/cache@v5
        with:
          path: backend/.venv
          key: uv-${{ hashFiles('backend/pyproject.toml', 'backend/uv.lock') }}
          restore-keys: uv-

      - name: Install Python deps
        run: cd backend && uv sync

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # PR: P0 + P1 only (~30 tests, <5 min)
      - name: Run E2E tests (PR — P0 + P1)
        if: github.event_name == 'pull_request'
        run: pnpm exec playwright test --grep '@p0|@p1'

      # Push to main: P0 + P1 + P2 (~50 tests, <10 min)
      - name: Run E2E tests (main — P0 + P1 + P2)
        if: github.event_name == 'push'
        run: pnpm exec playwright test --grep '@p0|@p1|@p2'

      # Nightly: ALL tests including P3 edge cases
      - name: Run E2E tests (nightly — full suite)
        if: github.event_name == 'schedule'
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
