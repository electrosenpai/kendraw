# Traefik dynamic TLS config — loaded from /etc/traefik/dynamic/ (see
# docker-compose.traefik.yml volume mount).
#
# `modern` profile: TLS 1.3 only on the wire where possible, TLS 1.2 with
# ECDHE+AEAD ciphers as a fallback for older mobile clients. This matches
# Mozilla's "Intermediate" config — it excludes RSA key exchange and CBC
# modes, which kills BEAST/Lucky13/ROBOT and forces Forward Secrecy.
tls:
  options:
    modern:
      minVersion: VersionTLS12
      sniStrict: true
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      curvePreferences:
        - X25519
        - CurveP256
        - CurveP384
